name: Deploy Cloudflare (Pages + Workers)

# Builds the marketing site, prerenders /, /pricing, /help and publishes the
# `dist/` output to Cloudflare Pages. Then deploys the routing Worker that
# splits photobrief.ai traffic between Pages (marketing) and Lovable (app),
# plus the agent Workers used by PhotoBrief's public and internal workflows.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      # Routes <img src> through /cdn-cgi/image/ in the production bundle and
      # the Puppeteer prerender, so Lighthouse downloads CF-resized variants
      # instead of the raw multi-MB PNGs.
      VITE_CF_IMAGES: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Validate production app configuration
        shell: bash
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY must be configured as repository secrets."
            exit 1
          fi

      - name: Install app dependencies
        run: npm ci

      - name: Install Puppeteer browser for prerender
        run: npx puppeteer browsers install chrome

      - name: Build Cloudflare Pages artifact
        run: npm run build:cloudflare-pages

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=photobrief-marketing --branch=main

      - name: Install Router Worker dependencies
        working-directory: workers/router
        run: npm install --no-package-lock

      - name: Deploy router Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/router
          command: deploy

      - name: Install MCP Worker dependencies
        working-directory: workers/mcp-agent
        run: npm install --no-package-lock

      - name: Deploy MCP Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/mcp-agent
          command: deploy

      - name: Install Capture Agent dependencies
        working-directory: workers/capture-agent
        run: npm install --no-package-lock

      - name: Deploy Capture Agent Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/capture-agent
          command: deploy

      - name: Install Assistant Agent dependencies
        working-directory: workers/assistant-agent
        run: npm install --no-package-lock

      - name: Deploy Assistant Agent Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/assistant-agent
          command: deploy

      - name: Install Beta Onboarding Agent dependencies
        working-directory: workers/beta-onboarding-agent
        run: npm install --no-package-lock

      - name: Deploy Beta Onboarding Agent Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/beta-onboarding-agent
          command: deploy

      - name: Install Site Installer Agent dependencies
        working-directory: workers/site-installer-agent
        run: npm install --no-package-lock

      - name: Deploy Site Installer Agent Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/site-installer-agent
          command: deploy

      - name: Smoke test public production endpoints
        run: node scripts/smoke-public-endpoints.mjs
