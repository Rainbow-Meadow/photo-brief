name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - port/photobrief-baseline-fixes
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, lint, typecheck, test, validate hosting, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate hybrid hosting contract
        run: npm run hosting:validate

      - name: Install Puppeteer browser for prerender
        run: npx puppeteer browsers install chrome

      - name: Build Cloudflare Pages artifact
        run: npm run build:cloudflare-pages

  worker-bundles:
    name: Bundle Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        worker:
          - workers/router
          - workers/mcp-agent
          - workers/capture-agent
          - workers/assistant-agent
          - workers/beta-onboarding-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Worker dependencies
        working-directory: ${{ matrix.worker }}
        run: npm install --no-package-lock

      - name: Bundle Worker with Wrangler
        working-directory: ${{ matrix.worker }}
        run: npx wrangler deploy --dry-run --outdir ../../dist-worker-check/${{ matrix.worker }}
