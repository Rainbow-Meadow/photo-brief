name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - port/photobrief-baseline-fixes
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, lint, typecheck, test, validate hosting, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate hybrid hosting contract
        run: npm run hosting:validate

      - name: Build
        run: npm run build
