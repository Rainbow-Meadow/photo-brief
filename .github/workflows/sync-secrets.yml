name: Sync secrets to Cloudflare Secrets Store

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes)"
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Materialize .env.secrets
        env:
          ENV_SECRETS_DOTENV: ${{ secrets.ENV_SECRETS_DOTENV }}
        run: |
          if [ -z "$ENV_SECRETS_DOTENV" ]; then
            echo "::error::Repo secret ENV_SECRETS_DOTENV is not set."
            exit 1
          fi
          printf '%s\n' "$ENV_SECRETS_DOTENV" > .env.secrets
          echo "Wrote .env.secrets ($(wc -l < .env.secrets) lines)"
      - name: Run sync
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/sync-secrets-to-cloudflare.mjs --dry-run
          else
            node scripts/sync-secrets-to-cloudflare.mjs
          fi
      - name: Cleanup
        if: always()
        run: rm -f .env.secrets
