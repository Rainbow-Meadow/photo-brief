name: Complete landing React refactor

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/complete-landing-react-refactor.yml

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Landing and remove old script
        run: |
          python <<'PY'
          from pathlib import Path

          landing = Path('src/pages/Landing.tsx')
          text = landing.read_text()
          import_line = 'import { InteractiveHeroBriefAssembly } from "@/components/marketing/InteractiveHeroBriefAssembly";\n'
          if import_line not in text:
              marker = 'import { howItWorksSteps } from "@/components/marketing/HowItWorksSteps";\n'
              text = text.replace(marker, marker + import_line)

          start = text.index('function HeroBriefAssembly() {')
          end = text.index('\nfunction BriefMetric', start)
          text = text[:start] + 'function HeroBriefAssembly() {\n  return <InteractiveHeroBriefAssembly />;\n}\n' + text[end:]
          landing.write_text(text)

          index = Path('index.html')
          html = index.read_text()
          html = html.replace('\n    <script src="/interactive-tool.js" defer></script>', '')
          index.write_text(html)

          legacy = Path('public/interactive-tool.js')
          if legacy.exists():
              legacy.unlink()
          PY
      - name: Commit changes
        run: |
          rm -f .github/workflows/complete-landing-react-refactor.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/Landing.tsx index.html public/interactive-tool.js .github/workflows/complete-landing-react-refactor.yml
          git commit -m "Complete landing hero React refactor"
          git push
