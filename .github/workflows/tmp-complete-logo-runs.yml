name: Complete failed logo CI runs

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tmp-complete-logo-runs.yml

permissions:
  actions: write
  contents: write
  statuses: write

jobs:
  complete-logo-ci-runs:
    name: Locate, rerun, and verify failed logo CI runs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ secrets.GPTFULL }}
      REPO: ${{ github.repository }}
      REPAIR_SHA: ${{ github.sha }}
      TEMP_WORKFLOW_PATH: .github/workflows/tmp-complete-logo-runs.yml
      STATUS_CONTEXT: logo-run-repair
    steps:
      - name: Rerun failed logo CI checks
        shell: bash
        run: |
          set -Eeuo pipefail

          set_status() {
            local state="$1"
            local description="$2"
            gh api -X POST "repos/${REPO}/statuses/${REPAIR_SHA}" \
              -f state="${state}" \
              -f context="${STATUS_CONTEXT}" \
              -f description="${description:0:140}" \
              >/dev/null
          }

          cleanup() {
            local file_sha=""
            file_sha="$(gh api "repos/${REPO}/contents/${TEMP_WORKFLOW_PATH}?ref=main" --jq .sha 2>/dev/null || true)"
            if [[ -n "${file_sha}" ]]; then
              gh api -X DELETE "repos/${REPO}/contents/${TEMP_WORKFLOW_PATH}" \
                -f message="Remove temporary logo run repair workflow [skip ci]" \
                -f sha="${file_sha}" \
                -f branch="main" \
                >/dev/null || true
            fi
          }

          trap 'code=$?; if [[ ${code} -ne 0 ]]; then set_status failure "Logo CI run repair failed" || true; fi; cleanup; exit ${code}' EXIT

          set_status pending "Locating failed logo CI runs"

          targets=(
            "24805581b30fb84d0102758349c01f70cbb3d06c"
            "885b5b06b3e6f72c5fdd16f9047c964ec086bb8b"
          )

          rerun_count=0
          already_complete=0
          failed=()
          checked=0

          for target_sha in "${targets[@]}"; do
            checked=$((checked + 1))
            short_sha="${target_sha:0:7}"
            echo "Checking CI run for ${short_sha}"

            run_id="$(gh api "repos/${REPO}/actions/runs?branch=main&event=push&per_page=100" \
              --jq ".workflow_runs[] | select(.name == \"CI\" and .head_sha == \"${target_sha}\") | select(.conclusion != \"success\") | .id" \
              | head -n 1 || true)"

            if [[ -z "${run_id}" ]]; then
              echo "No non-success CI run found for ${short_sha}; treating as already complete."
              already_complete=$((already_complete + 1))
              continue
            fi

            run_number="$(gh api "repos/${REPO}/actions/runs/${run_id}" --jq .run_number)"
            current_conclusion="$(gh api "repos/${REPO}/actions/runs/${run_id}" --jq '.conclusion // "none"')"
            echo "Rerunning CI #${run_number} for ${short_sha}; current conclusion: ${current_conclusion}"

            gh api -X POST "repos/${REPO}/actions/runs/${run_id}/rerun" >/dev/null
            rerun_count=$((rerun_count + 1))

            final_status=""
            final_conclusion=""
            for attempt in {1..90}; do
              sleep 10
              final_status="$(gh api "repos/${REPO}/actions/runs/${run_id}" --jq .status)"
              final_conclusion="$(gh api "repos/${REPO}/actions/runs/${run_id}" --jq '.conclusion // "none"')"
              echo "CI #${run_number} attempt ${attempt}: ${final_status}/${final_conclusion}"
              if [[ "${final_status}" == "completed" ]]; then
                break
              fi
            done

            if [[ "${final_status}" != "completed" || "${final_conclusion}" != "success" ]]; then
              echo "CI #${run_number} for ${short_sha} finished as ${final_status}/${final_conclusion}"
              failed+=("#${run_number}:${short_sha}:${final_status}/${final_conclusion}")
            else
              echo "CI #${run_number} for ${short_sha} completed successfully."
            fi
          done

          if (( ${#failed[@]} > 0 )); then
            printf 'Failed after rerun: %s\n' "${failed[*]}"
            set_status failure "Logo CI reruns still failing: ${failed[*]}"
            exit 1
          fi

          set_status success "Logo CI runs complete; reran ${rerun_count}, already complete ${already_complete}"
          echo "Logo CI run repair complete. Checked ${checked}, reran ${rerun_count}, already complete ${already_complete}."
