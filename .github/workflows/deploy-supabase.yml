name: Deploy Supabase

on:
  workflow_dispatch:
    inputs:
      deploy_database:
        description: "Apply pending Supabase migrations"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      deploy_functions:
        description: "Deploy Supabase Edge Functions"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: mvlcefiygkzzewcdzsmj

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Supabase deployment secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not configured."
            exit 1
          fi
          if [ "${{ inputs.deploy_database }}" = "true" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "SUPABASE_DB_PASSWORD secret is required when deploy_database=true."
            exit 1
          fi

      - name: Install Supabase CLI
        run: npm install --global supabase@latest

      - name: Apply database migrations
        if: ${{ inputs.deploy_database == 'true' }}
        shell: bash
        run: supabase db push --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Edge Functions
        if: ${{ inputs.deploy_functions == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          supabase functions deploy process-email-queue --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy integration-webhook --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy integration-oauth-start --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy integration-oauth-callback --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy live-preview-submission --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy website-intelligence --project-ref "$SUPABASE_PROJECT_REF"
