name: Deploy Supabase

on:
  workflow_dispatch:
    inputs:
      deploy_database:
        description: "Apply pending migrations via run-migration edge function"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      deploy_functions:
        description: "Deploy Supabase Edge Functions"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: mvlcefiygkzzewcdzsmj
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Apply database migrations (via edge function)
        if: ${{ inputs.deploy_database == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$ADMIN_EMAIL" ] || [ -z "$ADMIN_PASSWORD" ]; then
            echo "ADMIN_EMAIL and ADMIN_PASSWORD secrets are required for database migrations."
            exit 1
          fi
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No migration files found."
            exit 0
          fi
          echo "Found ${#files[@]} migration file(s)."
          node scripts/run-migration.mjs "${files[@]}"

      - name: Install Supabase CLI (for function deploy)
        if: ${{ inputs.deploy_functions == 'true' }}
        run: npm install --global supabase@latest

      - name: Validate Supabase deployment secrets
        if: ${{ inputs.deploy_functions == 'true' }}
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not configured."
            exit 1
          fi

      - name: Deploy Edge Functions
        if: ${{ inputs.deploy_functions == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          supabase functions deploy process-email-queue --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy integration-webhook --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy integration-oauth-start --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy integration-oauth-callback --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy live-preview-submission --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy website-intelligence --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy run-migration --project-ref "$SUPABASE_PROJECT_REF"
