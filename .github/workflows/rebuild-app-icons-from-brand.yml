name: Rebuild app icons from brand mark

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/rebuild-app-icons-from-brand.yml

permissions:
  contents: write

jobs:
  rebuild-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install image tooling
        run: python -m pip install --quiet pillow

      - name: Generate app icon set from current brand mark
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          from PIL import Image

          brand_dir = Path('public/brand')
          source_path = brand_dir / 'mark-color.png'
          if not source_path.exists():
              raise SystemExit('Missing public/brand/mark-color.png')

          source = Image.open(source_path).convert('RGBA')
          bbox = source.getbbox()
          if not bbox:
              raise SystemExit('Brand mark is empty')
          source = source.crop(bbox)

          def contain_on_square(img: Image.Image, size: int, padding_ratio: float = 0.08, bg=None) -> Image.Image:
              canvas = Image.new('RGBA', (size, size), bg or (0, 0, 0, 0))
              max_dim = int(size * (1 - padding_ratio * 2))
              art = img.copy()
              art.thumbnail((max_dim, max_dim), Image.Resampling.LANCZOS)
              x = (size - art.width) // 2
              y = (size - art.height) // 2
              canvas.alpha_composite(art, (x, y))
              return canvas

          # Transparent brand/app assets. These are used by browsers, PWA manifests,
          # and app-like installs where transparency is supported.
          outputs = {
              brand_dir / 'icon-192.png': 192,
              brand_dir / 'icon-512.png': 512,
              brand_dir / 'favicon-16.png': 16,
              brand_dir / 'favicon-32.png': 32,
              brand_dir / 'favicon-color.png': 256,
              Path('public/icon-192.png'): 192,
              Path('public/icon-512.png'): 512,
              Path('public/favicon.png'): 32,
          }
          for path, size in outputs.items():
              contain_on_square(source, size, padding_ratio=0.06).save(path, optimize=True)

          # iOS tends to render transparent touch icons on an implicit background.
          # Give it the same brand mark on a deliberate deep-violet app tile.
          apple_bg = (13, 10, 20, 255)
          apple_icon = contain_on_square(source, 180, padding_ratio=0.08, bg=apple_bg)
          apple_icon.save(brand_dir / 'apple-touch-icon.png', optimize=True)
          apple_icon.save('public/apple-touch-icon.png', optimize=True)

          # ICO with multiple sizes, all derived from the current brand mark.
          ico = contain_on_square(source, 256, padding_ratio=0.06)
          ico.save(
              'public/favicon.ico',
              sizes=[(16, 16), (24, 24), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)],
          )
          ico.save(
              brand_dir / 'favicon.ico',
              sizes=[(16, 16), (24, 24), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)],
          )

          # WebP copy for future optimized usage.
          contain_on_square(source, 1024, padding_ratio=0.04).save(brand_dir / 'mark-color.webp', quality=92, method=6)

          # Sanity checks: root app icons should not be the old files and must contain visible pixels.
          for path in ['public/icon-192.png', 'public/icon-512.png', 'public/apple-touch-icon.png']:
              im = Image.open(path).convert('RGBA')
              alpha = im.getchannel('A')
              if alpha.getbbox() is None:
                  raise SystemExit(f'{path} has no visible pixels')
          PY

      - name: Write web app manifest
        shell: bash
        run: |
          cat > public/site.webmanifest <<'JSON'
          {
            "name": "PhotoBrief.ai",
            "short_name": "PhotoBrief",
            "description": "Guided customer photo intake for quote-ready briefs.",
            "start_url": "/",
            "scope": "/",
            "display": "standalone",
            "background_color": "#060507",
            "theme_color": "#8f63ff",
            "icons": [
              {
                "src": "/icon-192.png",
                "sizes": "192x192",
                "type": "image/png",
                "purpose": "any"
              },
              {
                "src": "/icon-512.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any"
              },
              {
                "src": "/brand/icon-192.png",
                "sizes": "192x192",
                "type": "image/png",
                "purpose": "maskable"
              },
              {
                "src": "/brand/icon-512.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "maskable"
              }
            ]
          }
          JSON

      - name: Remove empty/temporary workflows and commit icon updates
        shell: bash
        run: |
          rm -f .github/workflows/rebuild-app-icons-from-brand.yml
          rm -f .github/workflows/force-master-logo.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/brand public/icon-192.png public/icon-512.png public/favicon.png public/favicon.ico public/apple-touch-icon.png public/site.webmanifest .github/workflows/rebuild-app-icons-from-brand.yml .github/workflows/force-master-logo.yml
          git commit -m "Regenerate app icons from brand mark"
          git push
