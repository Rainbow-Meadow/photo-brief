name: Cleanup merged branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-merged-branches.yml
      - .github/branch-cleanup-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cleanup-merged-branches
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete merged work branches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

          branches=(
            "chore/trigger-product-spotlight-render"
            "cleanup/relaunch-context"
            "cleanup/remove-legacy-templates"
            "feature/credit-based-pricing"
            "feature/customer-capture-simplification"
            "feature/dashboard-interface-polish"
            "feature/ga4-conversion-tracking"
            "feature/global-image-asset-pass"
            "feature/global-image-asset-pass-2026"
            "feature/global-image-asset-pass-v2"
            "feature/hosted-intake-and-ai-routing"
            "feature/optimize-hybrid-hosting"
            "feature/product-spotlight-demo-video"
            "feature/proportionate-capture-feedback"
            "feature/r2-submission-media"
            "feature/relaunch-marketing-visual-system"
            "feature/seo-llm-discovery"
            "feature/simple-ai-request-builder"
            "feature/simple-product-guidance"
            "feature/simplified-pricing-model"
            "feature/sitewide-theme-toggle"
            "feature/standard-photo-assessment"
            "feature/streamlined-guide-builder"
            "feature/website-intake"
            "fix/remove-dashboard-starter-guide"
            "fix/use-existing-ga4-measurement-id"
            "followup/pre-model-credit-enforcement"
            "ops/cloudflare-host-audit"
            "port/photobrief-baseline-fixes"
          )

          deleted=0
          skipped=0
          missing=0

          for branch in "${branches[@]}"; do
            if [[ "$branch" == "main" ]]; then
              echo "Skipping protected branch: $branch"
              continue
            fi

            if ! git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
              echo "Already gone: $branch"
              missing=$((missing + 1))
              continue
            fi

            if git merge-base --is-ancestor "refs/remotes/origin/$branch" "refs/remotes/origin/main"; then
              echo "Deleting merged branch: $branch"
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/$branch"
              deleted=$((deleted + 1))
            else
              echo "::warning::Skipped unmerged branch: $branch"
              skipped=$((skipped + 1))
            fi
          done

          echo "Deleted: $deleted"
          echo "Skipped unmerged: $skipped"
          echo "Already missing: $missing"
