name: Branch maintenance

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List branches without deleting them"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  cleanup:
    name: Delete stale branches
    runs-on: ubuntu-latest
    steps:
      - name: Delete all branches except main and sandbox
        env:
          GH_TOKEN: ${{ secrets.GPTFULL }}
          REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "GPTFULL secret is not available."
            exit 1
          fi

          echo "Fetching branches for ${REPO}"
          page=1
          branches=()

          while true; do
            response=$(curl -fsS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/branches?per_page=100&page=${page}")

            count=$(jq 'length' <<< "${response}")
            if [[ "${count}" -eq 0 ]]; then
              break
            fi

            while IFS= read -r branch; do
              branches+=("${branch}")
            done < <(jq -r '.[].name' <<< "${response}")

            page=$((page + 1))
          done

          echo "Found ${#branches[@]} branches."

          for branch in "${branches[@]}"; do
            case "${branch}" in
              main|sandbox)
                echo "Keeping ${branch}"
                ;;
              *)
                if [[ "${DRY_RUN}" == "true" ]]; then
                  echo "Would delete ${branch}"
                else
                  encoded_branch=$(jq -rn --arg v "${branch}" '$v|@uri')
                  echo "Deleting ${branch}"
                  curl -fsS -X DELETE \
                    -H "Accept: application/vnd.github+json" \
                    -H "Authorization: Bearer ${GH_TOKEN}" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "https://api.github.com/repos/${REPO}/git/refs/heads/${encoded_branch}"
                fi
                ;;
            esac
          done
