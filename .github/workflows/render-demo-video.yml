name: Render product demo video

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - remotion/**
      - .github/workflows/render-demo-video.yml

permissions:
  contents: write

jobs:
  render:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install

      - name: Render product spotlight MP4
        working-directory: remotion
        run: npm run render

      - name: Commit rendered video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/marketing/photobrief-demo.mp4
          if git diff --cached --quiet; then
            echo "No rendered video changes."
          else
            git commit -m "Render product spotlight demo video"
            git push
          fi
