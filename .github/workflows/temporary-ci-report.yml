name: Temporary CI Report

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/temporary-ci-report.yml

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Run CI and write report
        shell: bash
        run: |
          set +e
          mkdir -p tmp
          REPORT="tmp/ci-report.md"
          {
            echo "# Temporary CI Report"
            echo
            echo "Commit: ${GITHUB_SHA}"
            echo "Generated: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
          } > "$REPORT"

          run_step() {
            local name="$1"
            shift
            local log="tmp/${name// /-}.log"
            echo "## ${name}" >> "$REPORT"
            echo >> "$REPORT"
            echo '```text' >> "$REPORT"
            "$@" > "$log" 2>&1
            local status=$?
            sed -n '1,220p' "$log" >> "$REPORT"
            if [ "$(wc -l < "$log")" -gt 220 ]; then
              echo "... [truncated; see workflow logs for full output]" >> "$REPORT"
            fi
            echo '```' >> "$REPORT"
            echo >> "$REPORT"
            echo "Exit code: ${status}" >> "$REPORT"
            echo >> "$REPORT"
            return $status
          }

          OVERALL=0
          run_step "npm ci" npm ci || OVERALL=1
          if [ "$OVERALL" -eq 0 ]; then
            run_step "typecheck" npm run typecheck || OVERALL=1
            run_step "lint" npm run lint || OVERALL=1
            run_step "test" npm run test || OVERALL=1
            run_step "build" npm run build || OVERALL=1
          fi

          {
            echo "## Result"
            echo
            if [ "$OVERALL" -eq 0 ]; then
              echo "PASS"
            else
              echo "FAIL"
            fi
          } >> "$REPORT"

          rm -f .github/workflows/temporary-ci-report.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$REPORT" .github/workflows/temporary-ci-report.yml
          git commit -m "Add temporary CI report"
          git push

          exit $OVERALL
