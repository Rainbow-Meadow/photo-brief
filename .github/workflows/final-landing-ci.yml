name: Final Landing CI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/final-landing-ci.yml

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Run production checks
        shell: bash
        run: |
          set +e
          mkdir -p .ci-diagnostics
          {
            echo "# Final landing CI"
            echo
            echo "Commit: $(git rev-parse HEAD)"
            echo "Run started: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
          } > .ci-diagnostics/final-landing-report.md

          run_check() {
            local name="$1"
            shift
            echo "## ${name}" >> .ci-diagnostics/final-landing-report.md
            echo '```text' >> .ci-diagnostics/final-landing-report.md
            "$@" > .ci-diagnostics/${name}.final.log 2>&1
            local code=$?
            cat .ci-diagnostics/${name}.final.log >> .ci-diagnostics/final-landing-report.md
            echo '```' >> .ci-diagnostics/final-landing-report.md
            echo >> .ci-diagnostics/final-landing-report.md
            echo "${name}=${code}" >> .ci-diagnostics/final-landing-status.env
            return 0
          }

          run_check npm-ci npm ci
          run_check typecheck npm run typecheck
          run_check lint npm run lint
          run_check build npm run build

          echo "## Summary" >> .ci-diagnostics/final-landing-report.md
          cat .ci-diagnostics/final-landing-status.env >> .ci-diagnostics/final-landing-report.md

      - name: Commit final report and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/final-landing-ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ci-diagnostics .github/workflows/final-landing-ci.yml
          git commit -m "Add final landing CI report" || echo "No diagnostics changes to commit"
          git push
