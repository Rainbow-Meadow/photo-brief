name: Apply landing agent replacement

on:
  push:
    branches:
      - sandbox

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, 'Apply direct landing agent replacement') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sandbox
          token: ${{ github.token }}

      - name: Replace landing beta form with direct agent component
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          landing = Path('src/pages/Landing.tsx')
          text = landing.read_text()

          if 'BetaOnboardingAgentExperience' not in text.split('/* ── JSON')[0]:
              text = text.replace(
                  'import { BetaSeatTracker } from "@/components/marketing/BetaSeatTracker";\n',
                  'import { BetaSeatTracker } from "@/components/marketing/BetaSeatTracker";\nimport { BetaOnboardingAgentExperience } from "@/components/marketing/BetaOnboardingAgentExperience";\n',
              )

          for removable in [
              '  MailCheck,\n',
              'import { Input } from "@/components/ui/input";\n',
              'import { Label } from "@/components/ui/label";\n',
              'import { Textarea } from "@/components/ui/textarea";\n',
              'import { supabase } from "@/integrations/supabase/client";\n',
              'import { toast } from "@/hooks/use-toast";\n',
              '  CONFIRMATION_SUMMARY,\n',
              '  MAX_DISCOUNT_LABEL,\n',
          ]:
              text = text.replace(removable, '')

          text = text.replace(
              'import { conversions, trackEvent } from "@/lib/analytics";\n',
              'import { trackEvent } from "@/lib/analytics";\n',
          )

          form_start = text.find('/* ── Form ──────────────────────────────────────────────────── */')
          form_end = text.find('/* ── Main component ───────────────────────────────────────── */')
          if form_start != -1 and form_end != -1:
              text = text[:form_start] + text[form_end:]

          text = text.replace('  const interest = params.get("interest") || "founding-partner";\n\n', '')
          for state_line in [
              '  const [form, setForm] = useState<FormState>(EMPTY);\n',
              '  const [submitting, setSubmitting] = useState(false);\n',
              '  const [done, setDone] = useState<"new" | "already" | null>(null);\n',
              '  const [applicationStarted, setApplicationStarted] = useState(false);\n',
          ]:
              text = text.replace(state_line, '')

          update_start = text.find('  const update =\n')
          post_done = text.find('  /* ── Post-submission thank-you', update_start)
          if update_start != -1 and post_done != -1:
              text = text[:update_start] + text[post_done:]

          done_start = text.find('  /* ── Post-submission thank-you')
          main_return = text.find('  return (\n    <>\n      <PageMeta\n        title="PhotoBrief.ai', done_start)
          if done_start != -1 and main_return != -1:
              text = text[:done_start] + text[main_return:]

          apply_start = text.find('        {/* ━━ APPLICATION FORM')
          final_cta = text.find('        {/* ━━ FINAL CTA', apply_start)
          if apply_start != -1 and final_cta != -1:
              text = (
                  text[:apply_start]
                  + '        {/* ━━ AGENT-POWERED APPLICATION ━━━━━━━━━━━━━━━━━━━━━ */}\n'
                  + '        <section id="apply" className="pb-section scroll-mt-8">\n'
                  + '          <div className="pb-container">\n'
                  + '            <BetaOnboardingAgentExperience source="landing" />\n'
                  + '          </div>\n'
                  + '        </section>\n\n'
                  + text[final_cta:]
              )

          field_start = text.find('\nfunction Field(')
          if field_start != -1:
              text = text[:field_start].rstrip() + '\n'

          landing.write_text(text)

          layout = Path('src/components/layout/MarketingLayout.tsx')
          layout_text = layout.read_text()
          layout_text = layout_text.replace('import { LandingBetaAgentMount } from "@/components/marketing/LandingBetaAgentMount";\n', '')
          layout_text = layout_text.replace('      <LandingBetaAgentMount />\n', '')
          layout.write_text(layout_text)

          mount = Path('src/components/marketing/LandingBetaAgentMount.tsx')
          if mount.exists():
              mount.unlink()
          PY

          npx prettier --write src/pages/Landing.tsx src/components/layout/MarketingLayout.tsx
          git config user.name "PhotoBrief Cleanup Bot"
          git config user.email "actions@photobrief.ai"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Apply direct landing agent replacement"
          git push origin HEAD:sandbox
