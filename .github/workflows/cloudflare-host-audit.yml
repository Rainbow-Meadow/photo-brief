name: Cloudflare Host Audit

on:
  push:
    branches:
      - ops/cloudflare-host-audit
  workflow_dispatch:
    inputs:
      domain:
        description: Domain to audit
        required: false
        default: photobrief.ai

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CF_AUDIT_DOMAIN: ${{ inputs.domain || 'photobrief.ai' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CF_EMAIL: ${{ secrets.CF_EMAIL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Cloudflare host audit
        run: node scripts/cloudflare-host-audit.mjs | tee cloudflare-host-audit.json

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-host-audit
          path: |
            cloudflare-host-audit.json
            cloudflare-host-audit.md
          if-no-files-found: error
