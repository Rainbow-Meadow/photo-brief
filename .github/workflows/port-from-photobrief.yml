name: Port finalized baseline changes

on:
  push:
    branches:
      - port/photobrief-baseline-fixes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: port-from-photobrief-${{ github.ref }}
  cancel-in-progress: true

jobs:
  port:
    name: Copy finalized files from accidental repo
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip port]') }}

    env:
      GPTFULL: ${{ secrets.GPTFULL }}
      SOURCE_REPO: Rainbow-Meadow/photobrief
      SOURCE_REF: main

    steps:
      - name: Checkout correct repo branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GPTFULL }}
          fetch-depth: 0

      - name: Confirm GPTFULL is available
        shell: bash
        run: |
          if [ -z "$GPTFULL" ]; then
            echo "GPTFULL secret is not available to this workflow."
            exit 1
          fi
          echo "GPTFULL secret is configured."

      - name: Clone accidental source repo
        shell: bash
        run: |
          git clone --depth 1 --branch "$SOURCE_REF" "https://x-access-token:${GPTFULL}@github.com/${SOURCE_REPO}.git" ../photobrief-source

      - name: Copy finalized files
        shell: bash
        run: |
          set -euo pipefail
          files=(
            "README.md"
            "docs/database-architecture.md"
            "eslint.config.js"
            "package.json"
            "src/features/capture/pages/PublicRecipientPage.tsx"
            "src/hooks/useChatFlow.ts"
            "src/services/aiService.ts"
            "src/services/submissionsService.ts"
            "src/types/photobrief.ts"
            "supabase/functions/ai-analyze-media/index.ts"
            "supabase/functions/ai-summarize-submission/index.ts"
            "supabase/functions/create-checkout/index.ts"
            "supabase/functions/create-topup-checkout/index.ts"
            "supabase/functions/customer-portal/index.ts"
            "supabase/migrations/20260501120000_add_submission_answers.sql"
            "supabase/migrations/20260501130000_database_scale_hardening.sql"
            "supabase/migrations/20260501135000_define_canonical_domain_enums.sql"
            "supabase/migrations/20260501139000_prepare_beta_schema_cleanup.sql"
            "supabase/migrations/20260501140000_beta_schema_cleanup.sql"
            "supabase/migrations/20260501150000_align_schema_with_app_contract.sql"
          )

          for file in "${files[@]}"; do
            if [ ! -f "../photobrief-source/$file" ]; then
              echo "Missing source file: $file"
              exit 1
            fi
            mkdir -p "$(dirname "$file")"
            cp "../photobrief-source/$file" "$file"
          done

      - name: Restore correct branch references in CI
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('.github/workflows/ci.yml')
          if p.exists():
              s = p.read_text()
              s = s.replace('debug/photobrief-edits', 'port/photobrief-baseline-fixes')
              p.write_text(s)
          PY

      - name: Commit copied files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/database-architecture.md eslint.config.js package.json src supabase
          if git diff --cached --quiet; then
            echo "No file changes to commit."
            exit 0
          fi
          git commit -m "Port PhotoBrief baseline fixes from photobrief [skip port]"
          git push
