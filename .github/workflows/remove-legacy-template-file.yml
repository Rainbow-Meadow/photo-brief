name: Remove Legacy Template File

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - cleanup/remove-legacy-templates
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cleanup/remove-legacy-templates
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove generated legacy template file
        run: |
          set -euo pipefail
          if [ -f src/config/guideTemplates.ts ]; then
            git rm src/config/guideTemplates.ts
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Delete generated legacy guide templates"
            git push origin HEAD:cleanup/remove-legacy-templates
          else
            echo "src/config/guideTemplates.ts already removed"
          fi
