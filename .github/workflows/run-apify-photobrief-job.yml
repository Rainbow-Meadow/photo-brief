name: Run Apify PhotoBrief job

on:
  workflow_dispatch:
    inputs:
      input_json:
        description: "Optional Apify actor input JSON"
        required: false
        default: ""
      wait_for_finish_seconds:
        description: "Seconds Apify should wait before returning run status"
        required: false
        default: "60"
      max_poll_minutes:
        description: "Maximum minutes to poll for completion"
        required: false
        default: "10"
      fetch_dataset_items:
        description: "Fetch dataset items after completion"
        required: false
        default: "true"
      dataset_item_limit:
        description: "Maximum dataset items to fetch"
        required: false
        default: "500"

permissions:
  contents: read

jobs:
  run-apify-job:
    name: Run Apify actor YLjN3dsBlenhu5Rhn
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      ACTOR_ID: YLjN3dsBlenhu5Rhn
      APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
      INPUT_JSON: ${{ github.event_name == 'workflow_dispatch' && inputs.input_json || '{"startUrls":[{"url":"https://photobrief.ai/"},{"url":"https://photobrief.ai/signup"},{"url":"https://photobrief.ai/pricing"},{"url":"https://photobrief.ai/badge/intake"}]}' }}
      WAIT_FOR_FINISH_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.wait_for_finish_seconds || '60' }}
      MAX_POLL_MINUTES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_poll_minutes || '10' }}
      FETCH_DATASET_ITEMS: ${{ github.event_name == 'workflow_dispatch' && inputs.fetch_dataset_items || 'true' }}
      DATASET_ITEM_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.dataset_item_limit || '500' }}

    steps:
      - name: Validate configuration
        run: |
          if [ -z "$APIFY_TOKEN" ]; then
            echo "APIFY_TOKEN secret is not configured."
            exit 1
          fi

      - name: Start Apify actor run
        id: start
        shell: bash
        run: |
          set -euo pipefail
          echo "$INPUT_JSON" > input.json
          if ! jq empty input.json >/dev/null 2>&1; then
            echo "input_json is not valid JSON"
            cat input.json
            exit 1
          fi

          response=$(curl -sS \
            -X POST \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary @input.json \
            "https://api.apify.com/v2/acts/$ACTOR_ID/runs?waitForFinish=$WAIT_FOR_FINISH_SECONDS")

          echo "$response" > run-response.json
          cat run-response.json | jq .

          run_id=$(jq -r '.data.id // empty' run-response.json)
          status=$(jq -r '.data.status // empty' run-response.json)
          dataset_id=$(jq -r '.data.defaultDatasetId // empty' run-response.json)

          if [ -z "$run_id" ]; then
            echo "Apify did not return a run id."
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "dataset_id=$dataset_id" >> "$GITHUB_OUTPUT"

      - name: Poll Apify actor run
        id: poll
        shell: bash
        run: |
          set -euo pipefail
          run_id="${{ steps.start.outputs.run_id }}"
          deadline=$((SECONDS + MAX_POLL_MINUTES * 60))
          status="${{ steps.start.outputs.status }}"
          dataset_id="${{ steps.start.outputs.dataset_id }}"

          while [ "$SECONDS" -lt "$deadline" ]; do
            response=$(curl -sS \
              -H "Authorization: Bearer $APIFY_TOKEN" \
              "https://api.apify.com/v2/actor-runs/$run_id")
            echo "$response" > poll-response.json
            status=$(jq -r '.data.status // empty' poll-response.json)
            dataset_id=$(jq -r '.data.defaultDatasetId // empty' poll-response.json)
            echo "Apify run status: $status"

            case "$status" in
              SUCCEEDED|FAILED|TIMED-OUT|ABORTED)
                break
                ;;
            esac
            sleep 15
          done

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "dataset_id=$dataset_id" >> "$GITHUB_OUTPUT"

          if [ "$status" != "SUCCEEDED" ]; then
            echo "Apify run ended with status $status"
            cat poll-response.json | jq .
            exit 1
          fi

      - name: Fetch dataset items
        if: ${{ env.FETCH_DATASET_ITEMS == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          dataset_id="${{ steps.poll.outputs.dataset_id }}"
          if [ -z "$dataset_id" ]; then
            echo "No default dataset id returned."
            exit 0
          fi

          curl -sS \
            -H "Authorization: Bearer $APIFY_TOKEN" \
            "https://api.apify.com/v2/datasets/$dataset_id/items?clean=true&format=json&limit=$DATASET_ITEM_LIMIT" \
            > dataset-items.json

          jq . dataset-items.json

      - name: Upload Apify outputs
        uses: actions/upload-artifact@v4
        with:
          name: apify-photobrief-run
          path: |
            input.json
            run-response.json
            poll-response.json
            dataset-items.json
          if-no-files-found: ignore
