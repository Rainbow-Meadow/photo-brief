name: Render demo video temp

on:
  push:
    branches:
      - feature/product-spotlight-demo-video
    paths:
      - remotion/**
      - .github/workflows/render-demo-video-temp.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: feature/product-spotlight-demo-video

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm install

      - name: Render product spotlight MP4
        working-directory: remotion
        run: npx remotion render src/index.ts main ../public/marketing/photobrief-demo.mp4 --codec=h264 --crf=18 --pixel-format=yuv420p

      - name: Commit rendered video
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/marketing/photobrief-demo.mp4
          if git diff --cached --quiet; then
            echo "No rendered video changes."
          else
            git commit -m "Render rebuilt product spotlight demo video"
            git push origin HEAD:feature/product-spotlight-demo-video
          fi
