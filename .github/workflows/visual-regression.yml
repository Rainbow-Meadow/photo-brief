name: Visual regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to shoot against"
        required: false
        default: "https://photo-brief.lovable.app"

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PHOTOBRIEF_BASE_URL: ${{ github.event.inputs.base_url || 'https://photo-brief.lovable.app' }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lockb', 'package.json') }}

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run visual regression suite
        run: bun run test:visual

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/visual/.report
          retention-days: 14

      - name: Upload diff artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diffs
          path: tests/visual/.results
          retention-days: 14
