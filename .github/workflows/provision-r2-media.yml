name: Provision R2 Media Bucket

on:
  push:
    branches:
      - feature/r2-submission-media
  workflow_dispatch:
    inputs:
      domain:
        description: Domain allowed for browser media uploads
        required: false
        default: photobrief.ai
      bucket:
        description: R2 bucket name
        required: false
        default: photobrief-media

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CF_AUDIT_DOMAIN: ${{ inputs.domain || 'photobrief.ai' }}
      R2_BUCKET_NAME: ${{ inputs.bucket || 'photobrief-media' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      CF_EMAIL: ${{ secrets.CF_EMAIL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Provision R2 bucket, CORS, and lifecycle rules
        run: node scripts/provision-r2-media.mjs | tee r2-provision-result.json
      - name: Upload provision result
        uses: actions/upload-artifact@v4
        with:
          name: r2-provision-result
          path: r2-provision-result.json
          if-no-files-found: error
