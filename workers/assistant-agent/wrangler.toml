name = "photobrief-assistant-agent"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: co-locate with Supabase for lower latency on AI calls.
[placement]
mode = "smart"

[[routes]]
pattern = "assistant.photobrief.ai/*"
zone_name = "photobrief.ai"

[durable_objects]
bindings = [
  { name = "ASSISTANT_AGENT", class_name = "AssistantAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AssistantAgent"]

# Hyperdrive: pooled + cached connection to the Supabase Postgres.
# Used for read paths from the worker. Writes that depend on RLS still go
# through the Supabase JS client. See workers/_shared/db.ts.
[[hyperdrive]]
binding = "HYPERDRIVE"
id      = "cea7652fc3924714826c43a4090de08a"

# Analytics Engine: usage_events mirror for fast dashboards.
[[analytics_engine_datasets]]
binding = "AE_USAGE"
dataset = "pb_usage_events"

# Recipient bundle cache (KV). Same namespace as router.
[[kv_namespaces]]
binding = "RECIPIENT_BUNDLES"
id      = "RECIPIENT_BUNDLES_KV_ID"

[vars]
SUPABASE_URL = "https://mvlcefiygkzzewcdzsmj.supabase.co"
SITE_URL = "https://photobrief.ai"

# Cloudflare Secrets Store binding (store id: c6c05c6c4b8747e18e31a3f88c5781a4).
# Synced via `node scripts/sync-secrets-to-cloudflare.mjs`. See docs/secrets-rotation.md.
[[secrets_store_secrets]]
binding     = "SUPABASE_SERVICE_ROLE_KEY"
store_id    = "c6c05c6c4b8747e18e31a3f88c5781a4"
secret_name = "SUPABASE_SERVICE_ROLE_KEY"
