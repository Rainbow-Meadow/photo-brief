name = "photobrief-capture-agent"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: run this worker in the Cloudflare datacenter closest to
# Supabase (us-east) to cut AI verdict round-trip time.
[placement]
mode = "smart"

[[routes]]
pattern = "capture-agent.photobrief.ai/*"
zone_name = "photobrief.ai"

[durable_objects]
bindings = [
  { name = "CAPTURE_AGENT", class_name = "CaptureAgent" },
  { name = "CAPTURE_SESSION", class_name = "CaptureSession" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CaptureAgent"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CaptureSession"]

# Hyperdrive: read path from Supabase Postgres.
[[hyperdrive]]
binding = "HYPERDRIVE"
id      = "cea7652fc3924714826c43a4090de08a"

# Analytics Engine mirror.
[[analytics_engine_datasets]]
binding = "AE_USAGE"
dataset = "pb_usage_events"

# Workers AI binding (env.AI.run). Available for opt-in capture-time
# guardrails (llama-guard) and live ASR (whisper / deepgram-flux). See
# docs/cloudflare-workers-ai-catalog.md.
[ai]
binding = "AI"

# Recipient bundle cache (read path).
[[kv_namespaces]]
binding = "RECIPIENT_BUNDLES"
id      = "f7d82555b5894d6cb44d7139b718d8c2"

[vars]
SUPABASE_URL = "https://mvlcefiygkzzewcdzsmj.supabase.co"
SITE_URL = "https://photobrief.ai"

# Service-role key for flushing CaptureSession state to Postgres on submit.
[[secrets_store_secrets]]
binding     = "SUPABASE_SERVICE_ROLE_KEY"
store_id    = "c6c05c6c4b8747e18e31a3f88c5781a4"
secret_name = "SUPABASE_SERVICE_ROLE_KEY"
