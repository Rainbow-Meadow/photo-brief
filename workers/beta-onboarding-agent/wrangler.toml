name = "photobrief-beta-onboarding-agent"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "beta-agent.photobrief.ai/*"
zone_name = "photobrief.ai"

[durable_objects]
bindings = [
  { name = "BETA_ONBOARDING_AGENT", class_name = "BetaOnboardingAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BetaOnboardingAgent"]

[vars]
SUPABASE_URL = "https://mvlcefiygkzzewcdzsmj.supabase.co"
SITE_URL = "https://photobrief.ai"
