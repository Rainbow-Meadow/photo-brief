<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>PhotoBrief | Take the right photos, every time.</title>
    <meta name="description" content="PhotoBrief turns vague customer photos into business-ready briefs. Chat-guided capture, AI quality checks, clean summaries — every time.">
    <meta name="author" content="PhotoBrief" />
    <meta name="theme-color" content="#0A6BFF" />
    <meta name="apple-mobile-web-app-title" content="PhotoBrief" />

    <link rel="icon" href="/favicon.ico" sizes="16x16 32x32 48x48" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/ed2857e4-751f-457b-9c7f-d97506a9d19d">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/attachments/og-images/ed2857e4-751f-457b-9c7f-d97506a9d19d">

    <meta property="og:site_name" content="PhotoBrief">
    <meta name="twitter:site" content="@photobriefai">
    <meta property="og:url" content="https://photobrief.ai/">

    <!-- Sitewide Organization + WebSite JSON-LD. Per-page SoftwareApplication,
         FAQPage, HowTo, Article, BreadcrumbList blobs are injected by usePageMeta. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://photobrief.ai/#org",
          "name": "PhotoBrief",
          "url": "https://photobrief.ai",
          "logo": "https://photobrief.ai/og-image.png",
          "email": "hello@photobrief.ai",
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://photobrief.ai/#website",
          "url": "https://photobrief.ai",
          "name": "PhotoBrief",
          "publisher": { "@id": "https://photobrief.ai/#org" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://photobrief.ai/help?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <meta property="og:title" content="PhotoBrief | Take the right photos, every time.">
    <meta name="twitter:title" content="PhotoBrief | Take the right photos, every time.">
    <meta property="og:description" content="PhotoBrief turns vague customer photos into business-ready briefs. Chat-guided capture, AI quality checks, clean summaries — every time.">
    <meta name="twitter:description" content="PhotoBrief turns vague customer photos into business-ready briefs. Chat-guided capture, AI quality checks, clean summaries — every time.">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
