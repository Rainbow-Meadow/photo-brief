<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("pb-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme = stored === "light" || stored === "dark" ? stored : prefersDark ? "dark" : "light";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.style.colorScheme = theme;
        } catch (_) {}
      })();
    </script>
    <title>PhotoBrief | Stop chasing customer photos</title>
    <meta name="description" content="PhotoBrief turns customer photo requests into guided mobile workflows. Send one clickable link manually, or automate website intake on Pro.">
    <meta name="author" content="PhotoBrief" />
    <meta name="theme-color" content="#F8F7FA" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#060507" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-title" content="PhotoBrief" />

    <link rel="stylesheet" href="/hero-refinements.css">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" href="/favicon.ico" sizes="48x48" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
    <link rel="mask-icon" href="/favicon.svg" color="#000000">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://photobrief.ai/photobrief-logo.svg">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://photobrief.ai/photobrief-logo.svg">

    <meta property="og:site_name" content="PhotoBrief">
    <meta name="twitter:site" content="@photobriefai">
    <meta property="og:url" content="https://photobrief.ai/">

    <!-- Sitewide Organization + WebSite JSON-LD. Per-page SoftwareApplication,
         FAQPage, HowTo, Article, BreadcrumbList blobs are injected by usePageMeta. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://photobrief.ai/#org",
          "name": "PhotoBrief",
          "url": "https://photobrief.ai",
          "logo": "https://photobrief.ai/photobrief-logo.svg",
          "email": "hello@photobrief.ai",
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://photobrief.ai/#website",
          "url": "https://photobrief.ai",
          "name": "PhotoBrief",
          "publisher": { "@id": "https://photobrief.ai/#org" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://photobrief.ai/help?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <meta property="og:title" content="PhotoBrief | Stop chasing customer photos">
    <meta name="twitter:title" content="PhotoBrief | Stop chasing customer photos">
    <meta property="og:description" content="PhotoBrief turns customer photo requests into guided mobile workflows. Send one clickable link manually, or automate website intake on Pro.">
    <meta name="twitter:description" content="PhotoBrief turns customer photo requests into guided mobile workflows. Send one clickable link manually, or automate website intake on Pro.">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
